<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P0RTR8T</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Kavivanar&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #faf7f2;
            --card-bg: #ffffff;
            --text-color: #111111;
            --border-main: 2px solid #111111;
            --shadow-subtle: 0 12px 24px rgba(17, 17, 17, 0.04), 0 4px 8px rgba(17, 17, 17, 0.02);
            --font-handwritten: 'Kavivanar', cursive, sans-serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-handwritten);
            color: var(--text-color);
            min-height: 100vh;
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 15% 15%, rgba(255, 211, 182, 0.12) 0%, transparent 50%),
                            radial-gradient(circle at 85% 85%, rgba(168, 230, 207, 0.1) 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 440px;
            z-index: 10;
            position: relative;
        }

        .base-card {
            background: var(--card-bg);
            border: var(--border-main);
            border-radius: 28px;
            padding: 45px 30px;
            box-shadow: var(--shadow-subtle);
            text-align: center;
        }

        #announcement-view {
            display: block;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #announcement-view.fade-out {
            opacity: 0;
            transform: scale(0.96);
        }

        #countdown-view {
            display: none;
            opacity: 0;
            transform: scale(1.02);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #countdown-view.fade-in {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.75;
            line-height: 1.5;
            margin-bottom: 5px;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 30px 0 35px 0;
            font-family: var(--font-sans);
        }

        .timer-block {
            background: #faf7f2;
            border: 1.5px solid rgba(17, 17, 17, 0.15);
            border-radius: 16px;
            padding: 12px 5px;
        }

        .timer-val {
            font-size: 1.8rem;
            font-weight: 600;
            display: block;
            line-height: 1.1;
        }

        .timer-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-top: 2px;
        }

        .schedule-container {
            position: relative;
            height: 75px;
            width: 100%;
            margin-top: 15px;
        }

        .schedule-card {
            position: absolute;
            top: 0; left: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: var(--border-main);
            border-radius: 18px;
            padding: 16px 24px;
            font-size: 1.2rem;
            box-shadow: 0 4px 0 #111111;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .schedule-card.visible {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .schedule-card.fall {
            animation: cardDropOff 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .utc-badge {
            font-family: var(--font-sans);
            font-size: 1rem;
            background: #111111;
            color: #ffffff;
            padding: 2px 10px;
            border-radius: 8px;
        }

        body.active-screen-glitch {
            animation: shakeCanvas 0.1s infinite alternate;
        }

        body.active-screen-glitch::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(rgba(11,11,11,0) 0px, rgba(11,11,11,0) 2px, rgba(11,11,11,0.06) 3px, rgba(11,11,11,0.06) 5px),
                        linear-gradient(90deg, rgba(255,0,0,0.04), rgba(0,255,0,0.02), rgba(0,0,255,0.04));
            pointer-events: none;
            z-index: 10000;
        }

        body.active-screen-glitch .base-card {
            animation: cardDistort 0.15s infinite alternate steps(2);
            position: relative;
        }

        body.active-screen-glitch .base-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 17, 17, 0.02);
            mix-blend-mode: exclusion;
            pointer-events: none;
            animation: flashOverlays 0.1s infinite alternate;
        }

        @keyframes shakeCanvas {
            0% { transform: translate(4px, 3px) rotate(0.5deg); }
            20% { transform: translate(-3px, -2px) rotate(-1deg); }
            40% { transform: translate(-5px, 1px) rotate(1deg); }
            60% { transform: translate(3px, 4px) rotate(0deg); }
            80% { transform: translate(-2px, -3px) rotate(1deg); }
            100% { transform: translate(5px, 2px) rotate(-0.5deg); }
        }

        @keyframes cardDistort {
            0% { transform: skewX(-4deg) scale(0.98); box-shadow: 6px 0 0 rgba(255,0,0,0.4), -6px 0 0 rgba(0,0,255,0.4); }
            100% { transform: skewX(4deg) scale(1.02); box-shadow: -5px 0 0 rgba(255,0,0,0.3), 5px 0 0 rgba(0,255,0,0.4); filter: hue-rotate(45deg); }
        }

        @keyframes flashOverlays {
            0% { clip-path: inset(10% 0 80% 0); }
            100% { clip-path: inset(70% 0 5% 0); }
        }

        @keyframes cardDropOff {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(220px) rotate(12deg); }
        }

        @media(max-width: 480px) {
            .base-card { padding: 35px 20px; }
            h1 { font-size: 2.3rem; }
            .timer-val { font-size: 1.5rem; }
            .schedule-card { padding: 14px 18px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="base-card" id="announcement-view">
            <h1>Whitelist Closed</h1>
            <p class="subtitle">Thank you to everyone who joined PORTR8T. The whitelist campaign has officially ended.</p>
        </div>

        <div class="base-card" id="countdown-view">
            <h1>Mint Starts In</h1>
            
            <div class="timer-grid">
                <div class="timer-block">
                    <span class="timer-val" id="val-days">00</span>
                    <span class="timer-label">Days</span>
                </div>
                <div class="timer-block">
                    <span class="timer-val" id="val-hours">00</span>
                    <span class="timer-label">Hours</span>
                </div>
                <div class="timer-block">
                    <span class="timer-val" id="val-mins">00</span>
                    <span class="timer-label">Mins</span>
                </div>
                <div class="timer-block">
                    <span class="timer-val" id="val-secs">00</span>
                    <span class="timer-label">Secs</span>
                </div>
            </div>

            <div class="schedule-container" id="schedule-box">
                <div class="schedule-card" id="card-0">
                    <span>Treasury</span>
                    <span class="utc-badge">13:00 UTC</span>
                </div>
                <div class="schedule-card" id="card-1">
                    <span>GTD</span>
                    <span class="utc-badge">14:00 UTC</span>
                </div>
                <div class="schedule-card" id="card-2">
                    <span>FCFS</span>
                    <span class="utc-badge">15:00 UTC</span>
                </div>
                <div class="schedule-card" id="card-3">
                    <span>PUBLIC</span>
                    <span class="utc-badge">16:00 UTC</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        const cardNotice = document.getElementById('announcement-view');
        const cardMint = document.getElementById('countdown-view');
        const bodyNode = document.body;

        const timeDays = document.getElementById('val-days');
        const timeHours = document.getElementById('val-hours');
        const timeMins = document.getElementById('val-mins');
        const timeSecs = document.getElementById('val-secs');

        const targetMintDate = Date.UTC(2026, 5, 27, 13, 0, 0);

        function updateCountdownTimer() {
            const now = new Date().getTime();
            const gap = targetMintDate - now;

            if (gap <= 0) {
                timeDays.innerText = "00";
                timeHours.innerText = "00";
                timeMins.innerText = "00";
                timeSecs.innerText = "00";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            timeDays.innerText = d < 10 ? "0" + d : d;
            timeHours.innerText = h < 10 ? "0" + h : h;
            timeMins.innerText = m < 10 ? "0" + m : m;
            timeSecs.innerText = s < 10 ? "0" + s : s;
        }

        function triggerFinalGlitchAndRedirect() {
            bodyNode.classList.add('active-screen-glitch');
            
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 300, 100, 400, 100, 300, 100, 400]);
            }

            setTimeout(() => {
                if (navigator.vibrate) {
                    navigator.vibrate(0);
                }
                window.location.href = "https://opensea.io/collection/p0rtr8t/overview";
            }, 2500);
        }

        function runScheduleSequence() {
            let index = 0;
            const totalPhases = 4;

            function cyclePhase() {
                if (index >= totalPhases) {
                    setTimeout(triggerFinalGlitchAndRedirect, 1000);
                    return;
                }

                const currentCard = document.getElementById("card-" + index);
                currentCard.classList.add('visible');

                setTimeout(() => {
                    currentCard.classList.remove('visible');
                    currentCard.classList.add('fall');
                    
                    index++;
                    setTimeout(cyclePhase, 400);

                }, 2000);
            }

            cyclePhase();
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                cardNotice.classList.add('fade-out');

                setTimeout(() => {
                    cardNotice.style.display = 'none';
                    cardMint.classList.add('fade-in');
                    
                    updateCountdownTimer();
                    setInterval(updateCountdownTimer, 1000);
                    
                    runScheduleSequence();

                }, 400);

            }, 2000);
        });
    </script>
</body>
</html>
